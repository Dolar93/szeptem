# Auto-deploy na VPS po każdym pushu do main.
#
# Uśpione, dopóki nie włączysz. Aktywacja (po zakupie VPS):
#   1. GitHub → repo → Settings → Secrets and variables → Actions:
#      - zakładka Variables → New variable:  DEPLOY_ENABLED = true
#      - zakładka Secrets → New secret:      VPS_HOST     = IP serwera
#                                            VPS_USER     = ubuntu
#                                            VPS_SSH_KEY  = prywatny klucz SSH (cały plik)
#   2. Na VPS repo musi być sklonowane w /var/www/szeptem (deploy/INSTRUKCJA-VPS.md)
#
# Od tej chwili każdy push = strona zaktualizowana w ~20 sekund.

name: Deploy na VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Pull na serwerze
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/szeptem
            sudo git fetch origin main
            sudo git reset --hard origin/main
            # jeśli działa serwer node (faza 2) — restart usługi, jeśli istnieje
            sudo systemctl restart szeptem 2>/dev/null || true
